<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>AI 摄影大师</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff}
    
    #cam{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;display:none}
    #canvas{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:2}
    
    #preview{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10}
    #preview-img{max-width:100%;max-height:70vh;object-fit:contain;border-radius:8px}
    
    /* ===== 顶部栏 ===== */
    .header{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;z-index:100;background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent)}
    .logo{font-size:17px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.6)}
    
    /* ===== 美颜面板 ===== */
    .beauty-panel{
      position:fixed;top:48px;right:12px;
      background:rgba(0,0,0,.7);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-radius:16px;padding:16px 14px;z-index:100;
      width:160px;
      box-shadow:0 4px 20px rgba(0,0,0,.4);
    }
    .beauty-title{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .beauty-title .icon{font-size:16px}
    
    #level-slider{
      -webkit-appearance:none;appearance:none;
      width:100%;height:6px;border-radius:3px;
      background:rgba(255,255,255,.15);
      outline:none;cursor:pointer;
    }
    #level-slider::-webkit-slider-thumb{
      -webkit-appearance:none;appearance:none;
      width:22px;height:22px;border-radius:50%;
      background:#4ECDC4;border:3px solid #fff;
      box-shadow:0 2px 6px rgba(0,0,0,.3);
      cursor:pointer;
    }
    #level-slider::-moz-range-thumb{
      width:22px;height:22px;border-radius:50%;
      background:#4ECDC4;border:3px solid #fff;cursor:pointer;
    }
    
    .level-display{
      display:flex;justify-content:space-between;align-items:center;
      margin-top:8px;
    }
    #level-val{font-size:20px;font-weight:700;color:#4ECDC4;min-width:24px;text-align:center}
    .level-labels{display:flex;flex-direction:column;align-items:center;gap:2px}
    .level-labels span{font-size:10px;color:rgba(255,255,255,.4)}
    
    /* ===== 滤镜栏 ===== */
    #filter-bar{
      position:fixed;bottom:140px;left:0;right:0;
      display:flex;align-items:center;justify-content:center;gap:10px;
      padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;
      z-index:100;scrollbar-width:none;
    }
    #filter-bar::-webkit-scrollbar{display:none}
    
    .filter-btn{
      flex-shrink:0;padding:8px 14px;border-radius:20px;
      border:1.5px solid rgba(255,255,255,.25);
      background:rgba(0,0,0,.4);color:rgba(255,255,255,.8);
      font-size:13px;cursor:pointer;white-space:nowrap;
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      transition:all .25s;
    }
    .filter-btn.active{background:rgba(78,205,196,.85);border-color:#4ECDC4;color:#fff;font-weight:500}
    .filter-btn:hover{border-color:rgba(255,255,255,.5)}
    
    /* ===== 底部控制栏 ===== */
    .controls{position:fixed;bottom:40px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:36px;z-index:100;padding:0 24px}
    
    #shutter{
      width:72px;height:72px;border-radius:50%;background:#fff;
      border:4px solid rgba(255,255,255,.3);cursor:pointer;
      transition:transform .1s;display:flex;align-items:center;justify-content:center;
    }
    #shutter:active{transform:scale(.92);background:#ddd}
    #shutter::after{content:'';width:56px;height:56px;border-radius:50%;background:#fff;border:2px solid #ccc}
    
    .btn-icon{
      width:48px;height:48px;border-radius:50%;
      background:rgba(255,255,255,.15);border:none;color:#fff;
      font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
      backdrop-filter:blur(10px);transition:background .2s;
    }
    .btn-icon:hover{background:rgba(255,255,255,.28)}
    
    /* ===== 保存/重拍 ===== */
    .preview-btns{position:fixed;bottom:50px;left:0;right:0;display:flex;gap:16px;justify-content:center;z-index:101}
    #save,#retake{
      display:none;padding:14px 36px;border-radius:28px;border:none;
      font-size:16px;font-weight:500;cursor:pointer;transition:transform .1s;
    }
    #save{background:#4ECDC4;color:#fff}
    #retake{background:rgba(255,255,255,.2);color:#fff;backdrop-filter:blur(10px)}
    #save:active,#retake:active{transform:scale(.95)}
  </style>
</head>
<body>
  <video id="cam" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  
  <div id="preview">
    <img id="preview-img" alt="照片预览">
  </div>
  
  <!-- 顶部 -->
  <div class="header">
    <span class="logo">📷 AI摄影大师</span>
  </div>
  
  <!-- 美颜面板 -->
  <div class="beauty-panel">
    <div class="beauty-title"><span class="icon">✨</span> AI美颜</div>
    <input type="range" id="level-slider" min="0" max="10" value="6">
    <div class="level-display">
      <div class="level-labels"><span>关闭</span><span>最强</span></div>
      <span id="level-val">6</span>
    </div>
  </div>
  
  <!-- 滤镜栏 -->
  <div id="filter-bar">
    <button class="filter-btn active" data-filter="none">原图</button>
    <button class="filter-btn" data-filter="warm">☀️ 暖阳</button>
    <button class="filter-btn" data-filter="cool">❄️ 冷调</button>
    <button class="filter-btn" data-filter="vintage">🎞️ 复古</button>
    <button class="filter-btn" data-filter="bw">⬛ 黑白</button>
    <button class="filter-btn" data-filter="fresh">🌿 清新</button>
    <button class="filter-btn" data-filter="film">📽️ 胶片</button>
    <button class="filter-btn" data-filter="pink">🌸 粉嫩</button>
    <button class="filter-btn" data-filter="milk">🥛 奶白</button>
    <button class="filter-btn" data-filter="caramel">🍫 焦糖</button>
  </div>
  
  <!-- 底部控制 -->
  <div class="controls">
    <button class="btn-icon" id="switch-cam">🔄</button>
    <button id="shutter"></button>
  </div>
  
  <!-- 保存/重拍 -->
  <div class="preview-btns">
    <button id="save">💾 保存</button>
    <button id="retake">↩️ 重拍</button>
  </div>

  <script src="app.js"></script>
  <script>
    document.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.addEventListener('click',()=>selectFilter(btn.dataset.filter));
    });
  </script>
</body>
</html>
