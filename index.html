<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>AI 摄影大师</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    
    /* 相机视图 */
    #cam {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    
    /* 画布（隐藏，用于处理） */
    #canvas {
      display: none;
    }
    
    /* 预览层 */
    #preview {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    
    #preview-img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
    }
    
    /* 美颜指示器 */
    #beauty-indicator {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #4ECDC4;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      display: none;
      z-index: 20;
      white-space: nowrap;
    }
    
    /* 底部控制栏 */
    .controls {
      position: fixed;
      bottom: 40px;
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      z-index: 100;
      padding: 0 20px;
    }
    
    /* 快门按钮 */
    #shutter {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: white;
      border: 4px solid rgba(255,255,255,0.3);
      cursor: pointer;
      transition: transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #shutter:active {
      transform: scale(0.95);
      background: #ddd;
    }
    
    #shutter::after {
      content: '';
      width: 56px; height: 56px;
      border-radius: 50%;
      background: white;
      border: 2px solid #333;
    }
    
    /* 功能按钮 */
    .btn-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      transition: background 0.2s;
    }
    
    .btn-icon:hover {
      background: rgba(255,255,255,0.25);
    }
    
    /* 保存/重拍按钮 */
    #save, #retake {
      display: none;
      padding: 14px 32px;
      border-radius: 28px;
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s;
    }
    
    #save {
      background: #4ECDC4;
      color: white;
    }
    
    #retake {
      background: rgba(255,255,255,0.2);
      color: white;
      backdrop-filter: blur(10px);
    }
    
    #save:active, #retake:active {
      transform: scale(0.95);
    }
    
    /* 顶部信息 */
    .header {
      position: fixed;
      top: 20px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }
    
    .logo {
      color: white;
      font-size: 16px;
      font-weight: 500;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    
    /* 加载提示 */
    .loading {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 14px;
      z-index: 50;
    }
  </style>
</head>
<body>
  <!-- 相机视频 -->
  <video id="cam" autoplay playsinline></video>
  
  <!-- 处理画布 -->
  <canvas id="canvas"></canvas>
  
  <!-- 预览层 -->
  <div id="preview">
    <img id="preview-img" alt="照片预览">
  </div>
  
  <!-- 美颜指示 -->
  <div id="beauty-indicator">✨ 正在美颜...</div>
  
  <!-- 顶部 -->
  <div class="header">
    <span class="logo">📷 AI摄影大师</span>
    <button class="btn-icon" id="flash">⚡</button>
  </div>
  
  <!-- 底部控制 -->
  <div class="controls">
    <button class="btn-icon" id="switch-cam">🔄</button>
    <button id="shutter"></button>
    <button id="save">💾 保存</button>
    <button id="retake">↩️ 重拍</button>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
