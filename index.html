<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 摄影大师</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ====== 顶部状态栏 ====== -->
  <header id="status-bar">
    <div id="recording-indicator" class="hidden">
      <span class="rec-dot">●</span><span id="rec-time">00:00</span>
    </div>
    <div id="scene-badge" class="hidden">🏷️</div>
    <div id="mode-badge">🤖 AI智能</div>
    <div id="settings-btn">⚙️</div>
  </header>

  <!-- ====== 相机预览 ====== -->
  <div id="camera-container">
    <video id="camera-preview" autoplay playsinline muted></video>
    <canvas id="overlay-canvas"></canvas>

    <!-- 实时参数显示 -->
    <div id="camera-info-bar">
      <span id="ev-display">EV 0</span>
      <span id="iso-display">ISO —</span>
      <span id="shutter-display">快门 —</span>
    </div>

    <!-- 实时直方图 -->
    <div id="histogram-container">
      <canvas id="histogram-canvas" width="80" height="40"></canvas>
      <span id="histogram-label">直方图</span>
    </div>

    <!-- 水平仪 -->
    <div id="level-indicator">
      <div id="level-line"></div>
      <div id="level-bubble"></div>
    </div>

    <!-- AI 实时提示 -->
    <div id="ai-tip" class="hidden"></div>
  </div>

  <!-- ====== AI 摄影分析面板 ====== -->
  <div id="ai-panel">
    <div class="ai-panel-title">🤖 AI 摄影大师</div>
    <div id="ai-analysis-content">
      <div class="ai-row"><span class="ai-key">🎯 主体</span><span id="ai-subject" class="ai-val">—</span></div>
      <div class="ai-row"><span class="ai-key">🌍 场景</span><span id="ai-scene" class="ai-val">—</span></div>
      <div class="ai-row"><span class="ai-key">💡 光照</span><span id="ai-light" class="ai-val">—</span></div>
      <div class="ai-row"><span class="ai-key">📐 构图</span><span id="ai-comp" class="ai-val">—</span></div>
      <div class="ai-row"><span class="ai-key">⚡ 曝光</span><span id="ai-ev" class="ai-val">—</span></div>
      <div class="ai-row"><span class="ai-key">🎨 色温</span><span id="ai-tint" class="ai-val">—</span></div>
      <div id="ai-suggestion" class="ai-suggestion">开启相机，AI 自动分析画面</div>
    </div>

    <!-- 手动 EV 补偿 -->
    <div id="ev-comp-panel">
      <label>手动曝光补偿</label>
      <input type="range" id="ev-slider" min="-3" max="3" step="0.5" value="0">
      <div id="ev-ticks"><span>-3</span><span>0</span><span>+3</span></div>
    </div>
  </div>

  <!-- ====== 专业参数面板 ====== -->
  <div id="pro-panel" class="hidden">
    <div class="pro-section-title">📐 构图辅助</div>
    <div class="pro-row">
      <div class="pro-item">
        <span class="pro-label">网格</span>
        <div class="pro-values">
          <button class="pro-btn active" data-grid="off">关</button>
          <button class="pro-btn" data-grid="thirds">三分</button>
          <button class="pro-btn" data-grid="golden">黄金</button>
          <button class="pro-btn" data-grid="center">居中</button>
          <button class="pro-btn" data-grid="diag">对角</button>
        </div>
      </div>
    </div>
    <div class="pro-section-title">🛠️ 辅助工具</div>
    <div class="pro-row">
      <div class="pro-item">
        <span class="pro-label">辅助</span>
        <div class="pro-values">
          <button class="pro-btn active" data-aux="none">无</button>
          <button class="pro-btn" data-aux="histogram">直方图</button>
          <button class="pro-btn" data-aux="level">水平仪</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== 拍摄模式选择 ====== -->
  <div id="shooting-modes">
    <button class="shoot-btn active" data-mode="auto"><span class="shoot-icon">🤖</span><span>AI智能</span></button>
    <button class="shoot-btn" data-mode="portrait"><span class="shoot-icon">👤</span><span>人像</span></button>
    <button class="shoot-btn" data-mode="landscape"><span class="shoot-icon">🏔️</span><span>风景</span></button>
    <button class="shoot-btn" data-mode="night"><span class="shoot-icon">🌙</span><span>夜景</span></button>
    <button class="shoot-btn" data-mode="pro"><span class="shoot-icon">⚙️</span><span>专业</span></button>
  </div>

  <!-- ====== 底部操作栏 ====== -->
  <footer id="bottom-bar">
    <button id="btn-gallery">🖼️</button>
    <button id="btn-capture">●</button>
    <button id="btn-mode-info">AI智能</button>
    <button id="btn-switch">🔄</button>
    <button id="btn-flash">⚡</button>
  </footer>

  <!-- ====== 预览弹窗 ====== -->
  <div id="result-modal" class="hidden">
    <div id="result-header"><span id="result-tag">📷</span></div>
    <div id="result-body">
      <img id="result-original" src="" alt="">
      <canvas id="result-enhanced" width="0" height="0"></canvas>
    </div>
    <div id="result-actions">
      <button id="btn-save">💾 保存</button>
      <button id="btn-retake">🔄 重拍</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.1.0/dist/blazeface.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/mobilenet.min.js"></script>
<script src="app.js"></script>
</body>
</html>
