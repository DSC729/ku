<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>AI 摄影大师</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    /* 相机视频（隐藏，用canvas渲染） */
    #cam {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
      display: none; /* 用canvas替代显示 */
    }
    
    /* 渲染画布 — 实际显示的相机画面 */
    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 2;
    }
    
    /* 预览层 */
    #preview {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    
    #preview-img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
    }
    
    /* ======== 滤镜栏 ======== */
    #filter-bar {
      position: fixed;
      bottom: 130px;
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      z-index: 100;
      scrollbar-width: none;
    }
    #filter-bar::-webkit-scrollbar { display:none; }
    
    .filter-btn {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.4);
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.25s;
    }
    
    .filter-btn.active {
      background: rgba(78,205,196,0.85);
      border-color: #4ECDC4;
      color: white;
      font-weight: 500;
    }
    
    .filter-btn:hover { border-color: rgba(255,255,255,0.5); }
    
    /* ======== 底部控制栏 ======== */
    .controls {
      position: fixed;
      bottom: 40px;
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
      z-index: 100;
      padding: 0 24px;
    }
    
    /* 快门按钮 */
    #shutter {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: white;
      border: 4px solid rgba(255,255,255,0.3);
      cursor: pointer;
      transition: transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #shutter:active { transform: scale(0.92); background: #ddd; }
    #shutter::after {
      content:'';
      width: 56px; height: 56px;
      border-radius: 50%;
      background: white;
      border: 2px solid #ccc;
    }
    
    /* 功能按钮 */
    .btn-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      transition: background 0.2s;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.28); }
    
    /* 保存/重拍 */
    #save, #retake {
      display: none;
      padding: 14px 36px;
      border-radius: 28px;
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 30px;
      transition: transform 0.1s;
    }
    #save { background:#4ECDC4; color:white; }
    #retake { background:rgba(255,255,255,0.2); color:white; backdrop-filter:blur(10px); }
    #save:active, #retake:active { transform: scale(0.95); }
    
    /* 顶部信息 */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    }
    .logo {
      color: white;
      font-size: 17px;
      font-weight: 600;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
    
    /* 美颜状态指示 */
    .beauty-badge {
      color: #4ECDC4;
      font-size: 13px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <!-- 隐藏的视频源 -->
  <video id="cam" autoplay playsinline></video>
  
  <!-- 实时渲染画布 -->
  <canvas id="canvas"></canvas>
  
  <!-- 预览层 -->
  <div id="preview">
    <img id="preview-img" alt="照片预览">
  </div>
  
  <!-- 顶部 -->
  <div class="header">
    <span class="logo">📷 AI摄影大师</span>
    <span class="beauty-badge">✨ 实时美颜</span>
  </div>
  
  <!-- 滤镜栏 -->
  <div id="filter-bar">
    <button class="filter-btn active" data-filter="none">原图</button>
    <button class="filter-btn" data-filter="warm">☀️ 暖阳</button>
    <button class="filter-btn" data-filter="cool">❄️ 冷调</button>
    <button class="filter-btn" data-filter="vintage">🎞️ 复古</button>
    <button class="filter-btn" data-filter="bw">⬛ 黑白</button>
    <button class="filter-btn" data-filter="fresh">🌿 清新</button>
    <button class="filter-btn" data-filter="film">📽️ 胶片</button>
    <button class="filter-btn" data-filter="pink">🌸 粉嫩</button>
  </div>
  
  <!-- 底部控制 -->
  <div class="controls">
    <button class="btn-icon" id="switch-cam">🔄</button>
    <button id="shutter"></button>
  </div>
  
  <!-- 保存/重拍（在预览层内） -->
  <div style="position:fixed;bottom:40px;left:0;right:0;display:flex;gap:16px;justify-content:center;z-index:101;">
    <button id="save">💾 保存</button>
    <button id="retake">↩️ 重拍</button>
  </div>

  <script src="app.js"></script>
  <script>
    // 滤镜按钮事件
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => selectFilter(btn.dataset.filter));
    });
  </script>
</body>
</html>
