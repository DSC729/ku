<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>AI 摄影大师</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ====== 顶部栏 ====== -->
  <header id="top-bar">
    <div id="scene-badge"></div>
    <div id="mode-label">🤖 AI智能</div>
    <div id="ai-status-dot" class="loading"></div>
  </header>

  <!-- ====== 相机区域 ====== -->
  <div id="camera-wrap">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="render-cv"></canvas>
    <canvas id="guide-cv"></canvas>

    <!-- 实时参数HUD -->
    <div id="hud-params">
      <span id="hud-iso">ISO 100</span>
      <span id="hud-ape">f/2.8</span>
      <span id="hud-ss">1/60</span>
      <span id="hud-ev">EV ±0</span>
      <span id="hud-wb">5500K</span>
    </div>

    <!-- 直方图 -->
    <div id="hist-box"><canvas id="hist-cv" width="80" height="40"></canvas></div>

    <!-- 光线指示 -->
    <div id="light-indicator"></div>

    <!-- AI提示 -->
    <div id="ai-toast" class="hidden"></div>
  </div>

  <!-- ====== 拍摄模式 ====== -->
  <nav id="mode-bar">
    <button class="mbtn active" data-m="auto">🤖<small>AI</small></button>
    <button class="mbtn" data-m="portrait">👤<small>人像</small></button>
    <button class="mbtn" data-m="landscape">🏔️<small>风景</small></button>
    <button class="mbtn" data-m="food">🍽️<small>美食</small></button>
    <button class="mbtn" data-m="pet">🐾<small>宠物</small></button>
    <button class="mbtn" data-m="night">🌙<small>夜景</small></button>
    <button class="mbtn" data-m="pro">⚙️<small>专业</small></button>
  </nav>

  <!-- ====== AI 分析面板（侧边栏） ====== -->
  <div id="ai-panel">
    <div class="panel-hd">🤖 AI 摄影大脑</div>
    <div class="arow"><span>🎯 场景</span><span id="p-scene">分析中…</span></div>
    <div class="arow"><span>📁 子类</span><span id="p-sub">—</span></div>
    <div class="arow"><span>💡 光线</span><span id="p-light">—</span></div>
    <div class="arow"><span>📐 构图</span><span id="p-comp">—</span></div>
    <hr>
    <div class="arow"><span>⚡ ISO</span><span id="p-iso">100</span></div>
    <div class="arow"><span>🔵 光圈</span><span id="p-ape">f/2.8</span></div>
    <div class="arow"><span>⏱ 快门</span><span id="p-ss">1/60</span></div>
    <div class="arow"><span>🌡 白平衡</span><span id="p-wb">5500K</span></div>
    <div class="arow"><span>🎨 饱和度</span><span id="p-sat">100%</span></div>
    <div class="arow"><span>🔪 锐度</span><span id="p-shp">0</span></div>
    <div class="arow"><span>🌌 景深</span><span id="p-dof">中</span></div>
    <hr>
    <div id="p-tip">开启相机开始分析</div>
  </div>

  <!-- ====== 参数微调面板（拍完后） ====== -->
  <div id="edit-panel" class="hidden">
    <div class="panel-hd">🔧 参数微调</div>
    <div class="eslider"><label>亮度</label><input type="range" id="e-bright" min="-100" max="100" value="0"><span id="e-bright-v">0</span></div>
    <div class="eslider"><label>对比度</label><input type="range" id="e-contrast" min="-100" max="100" value="0"><span id="e-contrast-v">0</span></div>
    <div class="eslider"><label>饱和度</label><input type="range" id="e-saturation" min="-100" max="100" value="0"><span id="e-saturation-v">0</span></div>
    <div class="eslider"><label>色温</label><input type="range" id="e-temp" min="-100" max="100" value="0"><span id="e-temp-v">0</span></div>
    <div class="eslider"><label>锐度</label><input type="range" id="e-sharp" min="0" max="100" value="0"><span id="e-sharp-v">0</span></div>
    <div class="eslider"><label>暗角</label><input type="range" id="e-vignette" min="0" max="100" value="0"><span id="e-vignette-v">0</span></div>
    <div class="eslider"><label>景深模糊</label><input type="range" id="e-bokeh" min="0" max="100" value="0"><span id="e-bokeh-v">0</span></div>
    <div class="eslider"><label>褪色</label><input type="range" id="e-fade" min="0" max="100" value="0"><span id="e-fade-v">0</span></div>
  </div>

  <!-- ====== AI 抠图面板 ====== -->
  <div id="cutout-panel" class="hidden">
    <div class="panel-hd">✂️ AI 抠图</div>
    <div class="cutout-tools">
      <button class="cbtn active" id="cut-keep">🔴 保留</button>
      <button class="cbtn" id="cut-erase">🟢 擦除</button>
      <button class="cbtn" id="cut-undo">↩️ 撤销</button>
      <button class="cbtn" id="cut-clear">🗑️ 清除</button>
      <button class="cbtn" id="cut-finish">✅ 完成</button>
    </div>
    <div class="brush-ctrl">
      <label>画笔大小</label>
      <input type="range" id="cut-brush" min="5" max="60" value="20">
      <span id="cut-brush-v">20</span>
    </div>
    <canvas id="cutout-cv"></canvas>
  </div>

  <!-- ====== 底部操作栏 ====== -->
  <footer id="bot-bar">
    <button id="btn-gallery">🖼️</button>
    <button id="btn-shutter">●</button>
    <button id="btn-switch">🔄</button>
    <button id="btn-flash">⚡</button>
  </footer>

  <!-- ====== 拍照结果弹窗 ====== -->
  <div id="result-modal" class="hidden">
    <canvas id="result-cv"></canvas>
    <div id="result-toolbar">
      <button id="r-beauty" class="rbtn">✨ 一键美颜</button>
      <button id="r-edit" class="rbtn">🔧 参数微调</button>
      <button id="r-cutout" class="rbtn">✂️ AI 抠图</button>
      <button id="r-save" class="rbtn rbtn-primary">💾 保存</button>
      <button id="r-retake" class="rbtn">🔄 重拍</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.1.0/dist/blazeface.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/mobilenet.min.js"></script>
<script src="app.js"></script>
</body>
</html>
